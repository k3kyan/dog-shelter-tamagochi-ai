AWSTemplateFormatVersion: '2010-09-09'
Description: dog-shelter-tamagochi-ai infrastructure


# need ImageUri bc docker bc my app requiremetns (sentencetransformer and torch) are too big for lambda zip
Parameters:
  GroqApiKey:
    Type: String
    NoEcho: true
  DataBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-data
  FrontendBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-frontend

Resources:

  # --- ECR ---
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: dog-shelter-tamagochi-ai-api

  # --- DynamoDB ---
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dog-shelter-tamagochi-ai-players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_name
          AttributeType: S
      KeySchema:
        - AttributeName: player_name
          KeyType: HASH

  # --- IAM Role ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataBucketName}
                  - !Sub arn:aws:s3:::${DataBucketName}/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt PlayersTable.Arn

  # --- Lambda ---
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dog-shelter-tamagochi-ai-api
      PackageType: Image
      Code:
        # placeholder so Lambda can be created before the real image is pushed to ECR
        # CodePipeline replaces this with the real image on the first GitHub push
        ImageUri: public.ecr.aws/lambda/python:3.11
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 180
      MemorySize: 2048
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          DATA_PATH: /tmp/breed_profiles.parquet
          CHROMA_PATH: /tmp/chroma_db
          DYNAMODB_TABLE: dog-shelter-tamagochi-ai-players
          DATA_BUCKET: !Ref DataBucketName

  ApiUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ApiFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'

  ApiUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # --- S3 Frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucketName}/*

  # --- CloudFront ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendOrigin
            # uses the S3 website endpoint so CloudFront handles React SPA routing correctly
            DomainName: !Select [2, !Split ['/', !GetAtt FrontendBucket.WebsiteURL]]
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
        # redirect all 404s back to index.html for React client-side routing
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiEndpoint:
    Description: Lambda function URL
    Value: !GetAtt ApiUrl.FunctionUrl
  CloudFrontDomain:
    Description: CloudFront distribution domain URL (what you visit in the browser)
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation in buildspec.yml)
    Value: !Ref CloudFrontDistribution
  ECRRepository:
    Description: ECR repository URI
    Value: !GetAtt ApiRepository.RepositoryUri
