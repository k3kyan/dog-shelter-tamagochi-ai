AWSTemplateFormatVersion: '2010-09-09'
Description: dog-shelter-tamagochi-ai infrastructure


# need ImageUri bc docker bc my app requiremetns (sentencetransformer and torch) are too big for lambda zip
Parameters:
  # THE ONLY PARAMETER I NEED TO INJECT MANUALLY
  GroqApiKey:
    Type: String
    NoEcho: true
  # These are just names for organization and one place of control (i forgot the principle name)
  # TODO: replace the other resource names here too, like dynamodb, etc
  DataBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-data
  FrontendBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-frontend
  GitHubBranch:
    Type: String
    Default: main

Resources:

  # --- ECR ---
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: dog-shelter-tamagochi-ai-api
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep only the 3 most recent images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 3
              },
              "action": { "type": "expire" }
            }]
          }

  # --- DynamoDB ---
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dog-shelter-tamagochi-ai-players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_name
          AttributeType: S
      KeySchema:
        - AttributeName: player_name
          KeyType: HASH

  # --- IAM Role (Lambda) ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataBucketName}
                  - !Sub arn:aws:s3:::${DataBucketName}/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt PlayersTable.Arn

  # --- IAM Role (CodePipeline) ---
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-codepipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*

  # --- IAM Role (CodeBuild) ---
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-codebuild-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt ApiRepository.Arn
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                Resource: !GetAtt ApiFunction.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub ${FrontendBucket.Arn}/*
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/dog-shelter-tamagochi-ai/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # --- Lambda ---
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dog-shelter-tamagochi-ai-api
      PackageType: Image
      Code:
        # placeholder so Lambda can be created before the real image is pushed to ECR
        # CodePipeline replaces this with the real image on the first GitHub push
        ImageUri: public.ecr.aws/lambda/python:3.11
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 180
      MemorySize: 2048
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          DATA_PATH: /tmp/breed_profiles.parquet
          CHROMA_PATH: /tmp/chroma_db
          DYNAMODB_TABLE: dog-shelter-tamagochi-ai-players
          DATA_BUCKET: !Ref DataBucketName

  ApiUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ApiFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'

  ApiUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # --- CloudWatch log group (30-day retention, prevents logs accumulating forever) ---
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/dog-shelter-tamagochi-ai-api
      RetentionInDays: 30

  # --- S3 Data (parquet + chroma_db) ---
  # accessed by Lambda via IAM role, no need for bucket policy bc no public access
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DataBucketName

  # --- S3 Frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucketName}/*

  # --- S3 Pipeline artifacts (CodePipeline passes source zip to CodeBuild through here) ---
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: dog-shelter-tamagochi-ai-pipeline-artifacts

  # --- CloudFront ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendOrigin
            # uses the S3 website endpoint so CloudFront handles React SPA routing correctly
            DomainName: !Select [2, !Split ['/', !GetAtt FrontendBucket.WebsiteURL]]
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
        # redirect all 404s back to index.html for React client-side routing
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # --- GitHub connection (one-time OAuth handshake required in AWS console after deploy) ---
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: dog-shelter-tamagochi-ai-github
      ProviderType: GitHub

  # --- CodeBuild ---
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dog-shelter-tamagochi-ai-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true  # required for Docker builds inside CodeBuild
        EnvironmentVariables:
          - Name: GROQ_API_KEY
            Value: !Ref GroqApiKey
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE

  # --- CodePipeline ---
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dog-shelter-tamagochi-ai-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: k3kyan/dog-shelter-tamagochi-ai
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: SourceArtifact
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact

Outputs:
  ApiEndpoint:
    Description: Lambda function URL
    Value: !GetAtt ApiUrl.FunctionUrl
  CloudFrontDomain:
    Description: CloudFront distribution domain URL (what you visit in the browser)
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation in buildspec.yml)
    Value: !Ref CloudFrontDistribution
  ECRRepository:
    Description: ECR repository URI
    Value: !GetAtt ApiRepository.RepositoryUri
  GitHubConnectionArn:
    Description: Complete the OAuth handshake for this connection in AWS console -> Developer Tools -> Connections
    Value: !Ref GitHubConnection
