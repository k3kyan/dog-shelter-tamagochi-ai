AWSTemplateFormatVersion: '2010-09-09'
Description: dog-shelter-tamagochi-ai infrastructure


# need ImageUri bc docker bc my app requiremetns (sentencetransformer and torch) are too big for lambda zip
Parameters:
  # THE ONLY PARAMETER I NEED TO INJECT MANUALLY
  GroqApiKey:
    Type: String
    NoEcho: true
  # These are just names for organization and one place of control (i forgot the principle name)
  # TODO: replace the other resource names here too, like dynamodb, etc
  DataBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-data
  FrontendBucketName:
    Type: String
    Default: dog-shelter-tamagochi-ai-frontend
  GitHubBranch:
    Type: String
    Default: main
  # populated automatically by the CodePipeline Deploy stage from imageUri.json (never set manually)
  ImageUri:
    Type: String

Resources:

  # --- ECR ---
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: dog-shelter-tamagochi-ai-api
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep only the most recent image",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 1
              },
              "action": { "type": "expire" }
            }]
          }

  # --- DynamoDB ---
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dog-shelter-tamagochi-ai-players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_name
          AttributeType: S
      KeySchema:
        - AttributeName: player_name
          KeyType: HASH

  # --- IAM Role (Lambda) ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataBucketName}
                  - !Sub arn:aws:s3:::${DataBucketName}/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt PlayersTable.Arn

  # --- IAM Role (CloudFormation) ---
  # CloudFormation needs its own role to actually create/update resources during the Deploy stage. 
  # AdministratorAccess is standard for CloudFormation execution roles on portfolio projects (todo:)
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-cfn-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # --- IAM Role (CodePipeline) ---
  # CodePipeline needs permission to do its job: read from GitHub, trigger CodeBuild, and
  # read/write the s3 artifact bucket it uses to pass the source zip to CodeBuild between stages.
  # AssumeRolePolicyDocument = "which AWS service is allowed to wear this role"
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-codepipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # use the GitHub OAuth connection to pull source code
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              # trigger a CodeBuild run and check whether it finished
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              # read/write the artifact bucket — CodePipeline zips up the source code and puts it
              # here so CodeBuild can pick it up; GetBucketVersioning is required by CodePipeline internally
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*
              # run the CloudFormation Deploy stage — create/update the stack
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeChangeSet
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/dog-shelter-tamagochi-ai/*
              # pass the CloudFormationRole to CloudFormation so it can update resources
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationRole.Arn

  # --- IAM Role (CodeBuild) ---
  # CodeBuild is the one actually running buildspec.yml, so it needs permission for every AWS CLI
  # command in that file. It's long because buildspec.yml does a lot: 
  # Docker push, Lambda update, S3 sync, CloudFront invalidation
  # (cloudfront invalidation important bc cache!!! dont want stale)
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dog-shelter-tamagochi-ai-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dog-shelter-tamagochi-ai-codebuild-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # GetAuthorizationToken must be Resource: '*' bc its an account-level ECR action,
              # not scoped to a specific repo. needed for `aws ecr get-login-password` in buildspec.yml
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              # push the Docker image to ECR — all these actions are required for a docker push
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt ApiRepository.Arn
              # sync the React build to the frontend S3 bucket + read from the artifact bucket
              # (artifact bucket is where CodePipeline dropped the source zip for CodeBuild to use)
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub ${FrontendBucket.Arn}/*
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*
              # read the stack outputs to get the CloudFront distribution ID dynamically
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/dog-shelter-tamagochi-ai/*
              # bust the CloudFront cache so users get the new frontend immediately after deploy
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
              # write CodeBuild's own build logs to CloudWatch
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # --- Lambda ---
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dog-shelter-tamagochi-ai-api
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 180
      MemorySize: 2048
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          DATA_PATH: /tmp/breed_profiles.parquet
          CHROMA_PATH: /tmp/chroma_db
          DYNAMODB_TABLE: dog-shelter-tamagochi-ai-players
          DATA_BUCKET: !Ref DataBucketName

  ApiUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ApiFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'

  ApiUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # --- CloudWatch log group (30-day retention, prevents logs accumulating forever) ---
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/dog-shelter-tamagochi-ai-api
      RetentionInDays: 30

  # --- S3 Data (parquet + chroma_db) ---
  # accessed by Lambda via IAM role, no need for bucket policy bc no public access
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DataBucketName

  # --- S3 Frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucketName}/*

  # --- S3 Pipeline artifacts (CodePipeline passes source zip to CodeBuild through here) ---
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: dog-shelter-tamagochi-ai-pipeline-artifacts

  # --- CloudFront ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendOrigin
            # uses the S3 website endpoint so CloudFront handles React SPA routing correctly
            DomainName: !Select [2, !Split ['/', !GetAtt FrontendBucket.WebsiteURL]]
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
        # redirect all 404s back to index.html for React client-side routing
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # --- GitHub connection (one-time OAuth handshake required in AWS console after deploy) ---
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: dog-shelter-tamagochi-ai-github
      ProviderType: GitHub

  # --- CodeBuild ---
  # runs buildspec.yml
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dog-shelter-tamagochi-ai-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Environment:
        Type: LINUX_CONTAINER
        # BUILD_GENERAL1_MEDIUM = 4GB RAM, 2 vCPU. SMALL (3GB) sometimes OOMs (out of memory errors (aka docker image will maybe fail while being built)) during docker build
        # with heavy images like this one (torch + transformers). MEDIUM is the safe choice.
        # MEDIUM is a bit pricier than SMALL, but its still only a few cents per build (depending on duration) so its fine (prob)
        ComputeType: BUILD_GENERAL1_MEDIUM
        # standard:7.0 = Amazon Linux 2023, comes with Docker, Node 18, Python 3.11 pre-installed
        Image: aws/codebuild/standard:7.0
        # PrivilegedMode lets CodeBuild run the Docker daemon inside the build container. (tbh im still confused about this, need to research more later)
        # without this, `docker build` fails — CodeBuild containers are unprivileged by default.
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: GROQ_API_KEY
            Value: !Ref GroqApiKey
            Type: PLAINTEXT
      # CODEPIPELINE means CodeBuild gets its source from the artifact CodePipeline passes it
      # (the zipped GitHub source), rather than pulling from GitHub directly itself
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE

  # --- CodePipeline ---
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dog-shelter-tamagochi-ai-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: k3kyan/dog-shelter-tamagochi-ai
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: SourceArtifact
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
        - Name: Deploy
          Actions:
            - Name: DeployStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: dog-shelter-tamagochi-ai
                # template comes from source, image URI comes from build artifact
                TemplatePath: SourceArtifact::cloudformation/template.yaml
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
                # Fn::GetParam reads ImageUri out of imageUri.json produced by buildspec.yml
                # all other parameters (GroqApiKey, bucket names, etc.) retain their existing
                # stack values automatically. I only set GroqApiKey once on the first deploy
                ParameterOverrides: |
                  {
                    "ImageUri": {"Fn::GetParam": ["BuildArtifact", "imageUri.json", "ImageUri"]}
                  }
              InputArtifacts:
                - Name: SourceArtifact
                - Name: BuildArtifact

Outputs:
  ApiEndpoint:
    Description: Lambda function URL
    Value: !GetAtt ApiUrl.FunctionUrl
  CloudFrontDomain:
    Description: CloudFront distribution domain URL (what you visit in the browser)
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation in buildspec.yml)
    Value: !Ref CloudFrontDistribution
  ECRRepository:
    Description: ECR repository URI
    Value: !GetAtt ApiRepository.RepositoryUri
  GitHubConnectionArn:
    Description: Complete the OAuth handshake for this connection in AWS console -> Developer Tools -> Connections
    Value: !Ref GitHubConnection
