version: 0.2

env:
  variables:
    DATA_BUCKET: dog-shelter-tamagochi-ai-data
    FRONTEND_BUCKET: dog-shelter-tamagochi-ai-frontend
    LAMBDA_FUNCTION: dog-shelter-tamagochi-ai-api
    ECR_REPO: dog-shelter-tamagochi-ai-api
  # set GROQ_API_KEY as environment variable in the CodeBuild project

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - echo Installing frontend dependencies...
      - cd frontend && npm install && cd ..

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $ECR_REPO ./api
      - docker tag $ECR_REPO:latest $ECR_REGISTRY/$ECR_REPO:latest
      - echo Building React frontend...
      - cd frontend && npm run build && cd ..

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $ECR_REGISTRY/$ECR_REPO:latest
      - echo Updating Lambda function...
      - aws lambda update-function-code --function-name $LAMBDA_FUNCTION --image-uri $ECR_REGISTRY/$ECR_REPO:latest
      - echo Syncing frontend to S3...
      - aws s3 sync frontend/dist/ s3://$FRONTEND_BUCKET --delete
      - echo Invalidating CloudFront cache...
      - CLOUDFRONT_ID=$(aws cloudformation describe-stacks --stack-name dog-shelter-tamagochi-ai --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
      - echo Deploy complete.

# NOTE: I'm not uploading the .parquet or chroma_db/ files in buildspec.yml bc theyre static and dont change much and are TOO BIG
# if i update the .parquet or chroma_db/ files, I can reupload them with these commands (which i have to do before first github push anyways)
  # aws s3 cp pipeline/data/processed/breed_profiles.parquet s3://dog-shelter-tamagochi-ai-data/
  # aws s3 sync ragpipeline/data/chroma_db/ s3://dog-shelter-tamagochi-ai-data/chroma_db/
  